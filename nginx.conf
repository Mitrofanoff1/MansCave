server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # /privacy -> /privacy.html (статический экспорт Next.js)
    location / {
        try_files $uri $uri.html $uri/ =404;
    }

    error_page 404 /404.html;

    # Кэш статики, но не html (чтобы обновления подхватывались сразу)
    location ~* \.(?:js|css|woff2?|jpg|jpeg|png|webp|gif|svg|ico|mp4|webm)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }
}
